# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

name: R-CMD-check

permissions: read-all

concurrency:
  group: R-CMD-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # Temporary: use rtemis.core 0.2.0 from r-universe
      # pak ignores DESCRIPTION's Additional_repositories:
      # persist the r-universe repo into the repos
      # option that the pak driver reads.
      - name: Add rtemis r-universe to repos
        run: |
          cat(
            'options(repos = c(getOption("repos"), rtemisorg = "https://rtemis-org.r-universe.dev"))',
            file = "~/.Rprofile", sep = "\n", append = TRUE
          )
        shell: Rscript {0}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache-version: 2
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
          error-on: '"note"'
